<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menú Semanal</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <header class="hero">
    <h1>Menú Semanal</h1>
    <p class="subtitle">Tu plan de comidas de lunes a domingo</p>
  </header>

  <main>
    <section class="controls">
      <button id="prevWeek" class="btn">← Semana anterior</button>
      <span id="weekLabel" class="week-label"></span>
      <button id="nextWeek" class="btn">Semana siguiente →</button>
    </section>

    <section id="menuGrid" class="menu-grid" aria-live="polite"></section>
  </main>

  <footer>
    <p>Hecho con <span class="heart">♥</span> · PoC menú semanal</p>
  </footer>

  <script src="assets/js/menu-data.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
